experiment:
  name: exp002_fix_baseline
  description: "exp001のバグ修正: 動的パディング化 + 正規化無効化でStarter相当の~30を再現"

lineage:
  parent: exp001_baseline
  status: active
  diff_summary: "padding=max_length→動的パディング、normalize_text無効化、双方向学習OFF"

model:
  name: google/byt5-small
  max_length: 512
  prefix: "translate Akkadian to English: "

training:
  epochs: 20
  learning_rate: 1.0e-4
  optimizer: adafactor
  label_smoothing: 0.2
  batch_size: 1
  gradient_accumulation_steps: 8
  weight_decay: 0.01
  fp16: false
  seed: 42
  val_ratio: 0.1

inference:
  num_beams: 4
  max_length: 512
  early_stopping: true
  batch_size: 16

data:
  train_path: ../../datasets/raw/train.csv
  test_path: ../../datasets/raw/test.csv
  use_bidirectional: false
