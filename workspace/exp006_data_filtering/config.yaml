experiment:
  name: exp006_data_filtering
  description: "外れ値データ除去(word_ratio < 0.3 or > 5) + exp005の後処理最適化(repeated_removalのみ)"

lineage:
  parent: exp005_label_masking
  status: active
  diff_summary: "train/valから外れ値53件除去 + 後処理をrepeated_removalのみに変更"

model:
  name: google/byt5-small
  max_length: 512
  reverse_encoder_max_length: 1024
  prefix: "translate Akkadian to English: "
  prefix_reverse: "translate English to Akkadian: "

training:
  epochs: 20
  learning_rate: 1.0e-4
  optimizer: adafactor
  label_smoothing: 0.2
  batch_size: 1
  gradient_accumulation_steps: 8
  weight_decay: 0.01
  fp16: false
  seed: 42
  val_ratio: 0.1

inference:
  num_beams: 1
  max_length: 512
  early_stopping: true
  batch_size: 8

data:
  train_path: ../../datasets/raw/train.csv
  test_path: ../../datasets/raw/test.csv
  use_bidirectional: true
  filter_outliers: true
  word_ratio_min: 0.3
  word_ratio_max: 5.0
