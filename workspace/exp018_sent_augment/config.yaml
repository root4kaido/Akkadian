experiment_name: exp018_sent_augment
description: "文レベルアライメントデータで学習 + 境界位置augmentation"
base_experiment: exp016_byt5_base
model_name: google/byt5-base
max_length: 512
epochs: 20
learning_rate: 2e-4
batch_size: 4
gradient_accumulation_steps: 2
bf16: true
seed: 42
augment_prob: 0.5
augment_shift: 2
data: sentence_aligned.csv (fuzzy match分割データのみ)
