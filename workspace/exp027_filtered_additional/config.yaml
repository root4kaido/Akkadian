experiment:
  name: exp027_filtered_additional
  description: "exp023(前処理あり) + フィルタ済み追加データ(778件)でGKF fold3学習"

lineage:
  parent: exp023
  status: active
  diff_summary: "exp023のGKF train_gkf.pyに、eda021で作成したadditional_train_filtered.csv(778件)を追加"

model:
  name: google/byt5-base
  params:
    max_length: 512

training:
  seed: 42
  n_folds: 5
  epochs: 20
  batch_size: 4
  gradient_accumulation_steps: 2
  lr: 2e-4
  optim: adafactor
  bf16: true
  weight_decay: 0.01
