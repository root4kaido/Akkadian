experiment:
  name: s1_exp005_large_freeze
  description: "byt5-large: encoder全凍結 + decoder下位12層凍結、上位12層のみ学習"

lineage:
  parent: s1_exp002_large_lowlr
  status: active
  diff_summary: |
    - encoder全体を凍結
    - decoder block[0:12]を凍結、block[12:24]+lm_headのみ学習
    - その他はs1_exp002と同一(epoch=5, lr=5e-5)

model:
  name: google/byt5-large
  max_length: 512

training:
  seed: 42
  epochs: 10
  lr: 5e-5
  bf16: true
  optimizer: adafactor
  freeze_encoder: true
  freeze_decoder_layers: 12
  run_name: s1_exp005_large_freeze
